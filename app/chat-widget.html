<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title id="pageTitle">Devtac Viber Extension</title>
    <script src="https://live.zwidgets.com/js-sdk/1.4/ZohoEmbededAppSDK.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="brand-mark">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                    d="M24 8C14.06 8 6 15.39 6 24.45c0 5.27 2.67 9.97 6.83 13.07V42l5.04-2.77A19.2 19.2 0 0024 40.45c9.94 0 18-6.72 18-15.55C42 15.82 33.94 8 24 8z"
                    fill="white" opacity=".95" />
            <path
                    d="M30.5 29c-.45.45-.96.68-1.47.68-.23 0-.51-.06-.74-.17-1.47-.63-2.88-1.53-4.12-2.77-1.24-1.24-2.14-2.65-2.77-4.12-.23-.57-.11-1.19.28-1.58l.85-.85c.4-.4.4-1.02 0-1.41l-2.26-2.26c-.4-.4-1.02-.4-1.41 0l-.85.85c-.85.85-1.07 2.09-.62 3.16 1.3 3.05 3.5 5.76 6.38 8.02 1.58 1.19 3.39 2.2 5.42 2.94 1.07.4 2.26.11 3.05-.68l.85-.85c.4-.4.4-1.02 0-1.41l-2.26-2.26c-.4-.4-1.02-.4-1.41 0l-.92.71z"
                    fill="#7360f2" />
            <path d="M27 17h2.5A3.5 3.5 0 0133 20.5V21" stroke="#7360f2" stroke-width="1.8"
                  stroke-linecap="round" />
            <path d="M27 20.5h1A1.5 1.5 0 0129.5 22v.5" stroke="#7360f2" stroke-width="1.8"
                  stroke-linecap="round" />
        </svg>
    </div>
    <div class="header-text">
        <h1 id="widgetTitle">Devtac Viber Extension</h1>
    </div>
    <div class="header-right">
        <div class="channel-pill">
            <div class="channel-pill-dot"></div>
            Viber
        </div>
        <div class="credit-badge" id="viberCreditBadge" title="Remaining Viber credits" style="display:none;">
                <span class="credit-badge-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                                d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" />
                    </svg>
                </span>
            <span class="credit-value">—</span> credits
        </div>
        <div class="devtac-badge">by <span class="dt">Devtac</span></div>
    </div>
</div>

<!-- Recipient bar -->
<div class="recipient-bar">
    <div class="recipient-avatar" id="recipientAvatar">--</div>
    <div style="flex:1; min-width:0;">
        <div class="recipient-name" id="recipientName">Loading…</div>
        <div class="recipient-number" id="recipientNumber">—</div>
    </div>
    <div class="recipient-field-badge" id="phoneFieldBadge" title="Change phone field">Mobile</div>
    <button class="refresh-btn" id="refreshBtn" title="Refresh messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
    </button>
</div>

<!-- Messages area -->
<div class="messages-area" id="messagesArea">
    <div id="historyHeader" class="history-header" style="display:none;"></div>
    <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
        </svg>
        <p id="emptyText">Select a template or type a message<br>to start the conversation.</p>
    </div>
</div>

<!-- Compose area -->
<div class="compose-area">

    <!-- Template panel -->
    <div class="tpl-panel" id="tplPanel">
        <div class="tpl-panel-header">
            <span class="tpl-panel-title">Templates</span>
            <button class="tpl-panel-close" id="tplPanelClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="tpl-search-wrap">
            <div class="tpl-search-inner">
                <input type="text" class="tpl-search-input" id="tplSearch" placeholder="Search templates…"
                       autocomplete="off" />
                <span class="tpl-search-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                        </svg>
                    </span>
            </div>
        </div>
        <div class="tpl-list" id="tplList">
            <div class="tpl-empty">Loading templates…</div>
        </div>
    </div>

    <!-- Attachment preview strip -->
    <div class="attachment-strip" id="attachmentStrip"></div>

    <!-- Input row -->
    <div class="input-row">
        <div class="left-col">
            <button class="attach-btn" id="attachBtn" title="Attach file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32a1.5 1.5 0 01-2.122-2.122l7.693-7.693" />
                </svg>
                <span class="attach-dot"></span>
            </button>
            <input type="file" id="fileInput" multiple hidden />
            <button class="tpl-trigger-btn" id="tplTriggerBtn" title="Insert template">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
                <span class="tpl-dot"></span>
            </button>
            <button class="phone-pick-btn" id="phonePickBtn" title="Change phone field">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                </svg>
            </button>
        </div>
        <div class="textarea-wrap">
            <textarea id="msgInput" placeholder="Type your message…" maxlength="1000" disabled></textarea>
            <span class="char-count" id="charCount">0/1000</span>
        </div>
        <div class="send-col">
            <button class="send-btn" id="sendBtn" disabled title="Send">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- Phone picker bottom sheet -->
<div class="phone-picker-overlay" id="phonePickerOverlay">
    <div class="phone-picker-sheet">
        <div class="sheet-title">
            Choose Phone Field
            <button class="sheet-close" id="sheetCloseBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div id="phoneOptionsList"></div>
    </div>
</div>

<script type="module" src="js/chat-main.js"></script>
<script type="module">
    import { CONFIG } from "./js/config.js";
    document.getElementById("widgetTitle").textContent = CONFIG.WIDGET_NAME;
    document.getElementById("pageTitle").textContent = CONFIG.WIDGET_NAME + " – Chat";
</script>

</body>

</html>
