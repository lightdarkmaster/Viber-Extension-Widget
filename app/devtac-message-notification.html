<!DOCTYPE html>
<html>
<head>
    <title>Devtac Messaging Notification</title>
    <script src="https://live.zwidgets.com/js-sdk/1.4/ZohoEmbededAppSDK.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="header">
    <div class="brand-mark">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M24 8C14.06 8 6 15.39 6 24.45c0 5.27 2.67 9.97 6.83 13.07V42l5.04-2.77A19.2 19.2 0 0024 40.45c9.94 0 18-6.72 18-15.55C42 15.82 33.94 8 24 8z"
        fill="white" opacity=".95"/>
  <path d="M30.5 29c-.45.45-.96.68-1.47.68-.23 0-.51-.06-.74-.17-1.47-.63-2.88-1.53-4.12-2.77-1.24-1.24-2.14-2.65-2.77-4.12-.23-.57-.11-1.19.28-1.58l.85-.85c.4-.4.4-1.02 0-1.41l-2.26-2.26c-.4-.4-1.02-.4-1.41 0l-.85.85c-.85.85-1.07 2.09-.62 3.16 1.3 3.05 3.5 5.76 6.38 8.02 1.58 1.19 3.39 2.2 5.42 2.94 1.07.4 2.26.11 3.05-.68l.85-.85c.4-.4.4-1.02 0-1.41l-2.26-2.26c-.4-.4-1.02-.4-1.41 0l-.92.71z"
        fill="#7360f2"/>
  <path d="M27 17h2.5A3.5 3.5 0 0133 20.5V21" stroke="#7360f2" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M27 20.5h1A1.5 1.5 0 0129.5 22v.5" stroke="#7360f2" stroke-width="1.8" stroke-linecap="round"/>
</svg>
    </div>
    <div class="header-text">
        <h1>Devtac Messaging Notification</h1>
        <p>Configure template &amp; phone field for this workflow</p>
    </div>
    <div class="devtac-badge">by <span class="dt">Devtac</span></div>
</div>

<div class="card">
    <div class="card-label">Message</div>
    <div class="field-group">
        <label>Channel</label>
        <div class="module-badge">
            <span class="lock-icon">🔒</span>
            <span>Viber</span>
        </div>
        <div class="field-hint">More channels coming soon</div>
    </div>
    <div class="field-group">
        <label for="template">Template</label>
        <select id="template"><option value="">-- Select a template --</option></select>
    </div>
</div>

<div class="card">
    <div class="card-label">Recipient</div>
    <div class="row-inline">
        <div class="field-group">
            <label>Module</label>
            <div class="module-badge" id="moduleDisplay">
                <span class="lock-icon">🔒</span>
                <span id="moduleText">Loading…</span>
            </div>
            <input type="hidden" id="moduleSelect" />
            <div class="field-hint">Locked to this workflow</div>
        </div>
        <div class="field-group">
            <label for="phoneField">Phone Field</label>
            <select id="phoneField" disabled><option value="">-- Loading --</option></select>
            <div class="field-hint">Field to read the number from</div>
        </div>
    </div>
    <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Waiting for selections…</span>
    </div>
</div>

<button id="submitBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zm-5 16a3 3 0 110-6 3 3 0 010 6zm3-10H5V5h10v4z"/></svg>
    Save Configuration
</button>

<script type="module" src="js/main.js"></script>

</body>
</html>
